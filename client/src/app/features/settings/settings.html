<div class="space-y-8 animate-fade-in">
  <!-- Title section -->
  <div>
    <h2 class="text-2xl font-bold text-[#1F2937]">System Settings</h2>
   
  </div>

  <div class="max-w-3xl">
    <!-- Profile form container -->
    <div class="neu-card p-8 space-y-6">
      <h3 class="font-bold text-base text-[#1F2937] border-b border-white/30 pb-3">User Profile Information</h3>
      
      <!-- Feedback alert -->
      <div *ngIf="message" class="text-xs font-semibold py-2.5 px-4 rounded-xl border animate-fade-in"
           [ngClass]="isSuccess ? 'text-[#10B981] bg-[#10b98114] border-[#10B981]/15' : 'text-[#EF4444] bg-[#ef444414] border-[#EF4444]/15'">
        {{ message }}
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-[#64748B] mb-2 pl-1">Full Name</label>
          <input 
            type="text" 
            [(ngModel)]="name"
            class="neu-input" 
          />
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-[#64748B] mb-2 pl-1">Email Address</label>
          <input 
            type="email" 
            [(ngModel)]="email"
            class="neu-input" 
          />
        </div>
      </div>
      
      <div class="flex justify-end pt-4">
        <button 
          (click)="saveSettings()"
          class="neu-button-primary py-2.5 px-6 font-bold text-sm tracking-wide"
        >
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
